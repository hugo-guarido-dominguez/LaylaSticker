<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layla Sticker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">A tiny surprise</p>
      <h1>Click to reveal the prettiest girl in the world</h1>

      <button class="gift-button" id="revealButton" type="button" aria-controls="revealPanel" aria-expanded="false">
        <span class="gift-glow" aria-hidden="true"></span>
        <span class="gift-burst" aria-hidden="true"></span>
        <img src="giftIcon.png" alt="Gift icon" class="gift-icon">
      </button>

      <div class="reveal-panel" id="revealPanel" hidden>
        <img src="stickerLayla.jpg" alt="Layla sticker" class="sticker-image">
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
